version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-product-assistant-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_product_assistant
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_product_assistant"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-product-assistant-app
    environment:
      APP_ENV: dev
      HTTP_PORT: 8080
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/ai_product_assistant?sslmode=disable
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.openai.com/v1}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_MODEL: ${LLM_MODEL:-gpt-4}
      LLM_TIMEOUT_SEC: 15
      LLM_MAX_RETRIES: 2
      LLM_RETRY_BASE_DELAY_MS: 200
      HTTP_READ_TIMEOUT_SEC: 10
      HTTP_WRITE_TIMEOUT_SEC: 10
      HTTP_IDLE_TIMEOUT_SEC: 60
      HTTP_SHUTDOWN_TIMEOUT_SEC: 10
      DB_PING_TIMEOUT_SEC: 5
      HTTP_RATE_LIMIT_RPM: 20
      HTTP_RATE_LIMIT_WINDOW_SEC: 60
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge

